<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Rekap Antrean Photobox v2.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --whatsapp: #25d366;
            --whatsapp-hover: #20ba5a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 30px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 25px;
            height: fit-content;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .radio-group, .grid-select {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .paket-group {
            grid-template-columns: repeat(3, 1fr);
        }

        .frame-grid {
            grid-template-columns: repeat(5, 1fr);
        }

        .btn-check {
            display: none;
        }

        .btn-outline {
            display: block;
            text-align: center;
            padding: 8px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-check:checked + .btn-outline {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .table-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .btn-action {
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .btn-excel {
            background-color: #16a34a;
            color: white;
            border: none;
        }
        .btn-excel:hover { background-color: #15803d; }

        .btn-bulk-delete {
            background-color: #dc2626;
            color: white;
            border: none;
            display: none;
        }
        .btn-bulk-delete:hover { background-color: #b91c1c; }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }

        th {
            background-color: #f1f5f9;
            color: var(--text-main);
            padding: 12px 10px;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-waiting { background: #fee2e2; color: #ef4444; }
        .badge-success { background: #dcfce7; color: #15803d; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-info { background: #e0f2fe; color: #0369a1; }

        .action-select {
            padding: 5px;
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid var(--border);
            background: #fff;
            cursor: pointer;
        }

        .btn-row-action {
            padding: 4px 6px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: white;
            margin-right: 2px;
        }

        .btn-pdf {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-pdf:hover { background: #eeebff; }

        .btn-wa {
            color: white;
            background-color: var(--whatsapp);
            border-color: var(--whatsapp);
        }
        .btn-wa:hover { background: var(--whatsapp-hover); }

        .btn-delete {
            color: var(--danger);
            border-color: var(--danger);
        }
        .btn-delete:hover { background: #fee2e2; }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 20px;
            font-weight: 700;
        }

        /* Wadah Tersembunyi untuk QR Code Generator */
        #qrcode-hidden {
            position: absolute;
            left: -9999px;
            top: -9999px;
            background: white;
            padding: 10px;
        }
    </style>
</head>
<body>

        <p>Manajemen data antrean, paket cetak, frame, dan status produksi secara real-time</p>

        <div class="stat-card"><h3>Menunggu</h3><p id="stat-menunggu" style="color: var(--danger)">0</p></div>
        <div class="stat-card"><h3>Belum Cetak</h3><p id="stat-belum-cetak" style="color: var(--warning)">0</p></div>
        <div class="stat-card"><h3>Belum Diambil</h3><p id="stat-belum-ambil" style="color: var(--primary)">0</p></div>
    </div>

                    <label>Pilihan Paket</label>
